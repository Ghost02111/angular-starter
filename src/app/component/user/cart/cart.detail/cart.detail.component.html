<div class="cart-page">
  <div class="cart-container">
    <div class="cart-header">
      <h1 class="cart-title">Shopping Cart</h1>
      <span class="items-count">{{ cartItems.length }} items</span>
    </div>

    <div class="cart-content">
      <div class="cart-items">
        <div *ngIf="!cartItems || cartItems.length === 0" class="empty-cart">
          <h2>Your cart is empty</h2>
          <p>Add items to your cart to continue shopping</p>
					<h1>Empty Cart</h1>
          <a routerLink="/products" class="back-to-shop">
            <i class="fas fa-long-arrow-alt-left"></i>
            Continue Shopping
          </a>
        </div>

        <div *ngFor="let item of cartItems; let i = index">
          <app-cart-product-card
            [item]="item" 
            (listenAmountEvent)="setAmount($event)"
            (reduceCartItemEvent)="reduceItem(item)"
            (removeCartItemEvent)="removeItem(item)"
            (increaseCartItemEvent)="increaseItem(item)"
          >
          </app-cart-product-card>
        </div>
      </div>

      <div class="summary-section">
        <h2 class="summary-title">Order Summary</h2>

        <div class="summary-row">
          <span class="summary-label">Subtotal</span>
          <span class="summary-value">${{ totalprice }}</span>
        </div>

        <div class="summary-row">
          <span class="summary-label">Shipping</span>
          <select class="shipping-select">
            <option value="5">Standard Delivery - $5.00</option>
            <option value="15">Express Delivery - $15.00</option>
            <option value="25">Next Day Delivery - $25.00</option>
          </select>
        </div>

        <div class="summary-row">
          <span class="summary-label">Promo Code</span>
          <input 
            type="text" 
            class="promo-input"
            placeholder="Enter promo code"
          >
        </div>

        <div class="summary-row total-row">
          <span class="summary-label">Total</span>
          <span class="summary-value">${{ totalprice + 5 }}</span>
        </div>

        <button 
          type="button"
          class="checkout-btn"
          (click)="gotoCheckout()"
          
        >
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>
</div>
