<div class="product-card">
  <button class="remove-btn" (click)="remove()">
    <i class="fas fa-trash-alt"></i>
  </button>

  <div class="product-image">
    @if (item.imgUrl) {
      <img 
        [src]="'http://localhost:4000/' + item.imgUrl" 
        [alt]="item.name"
        onerror="this.src='http://localhost:4000/uploads/1735588001278-photo_2024-11-21_19-21-24.jpg'"
      >
    } @else {
      <img 
        src="http://localhost:4000/uploads/1735588001278-photo_2024-11-21_19-21-24.jpg" 
        alt="Default Image"
      >
    }
  </div>

  <div class="product-details">
    <div class="product-info">
      <h3 class="product-name">{{ item.name }}</h3>
      <p class="product-id">ID: {{ item.id }}</p>
    </div>

    <div class="quantity-controls">
      <button class="quantity-btn" (click)="reduce(amount.value)">
        <i class="fas fa-minus"></i>
      </button>

      <input 
        #amount 
        class="quantity-input" 
        type="number"
        [value]="item.quantity || 1"
        min="1"
        disabled
      >

      <button class="quantity-btn" (click)="increase(amount.value)">
        <i class="fas fa-plus"></i>
      </button>

      <span class="amount">Qty: {{ item.quantity || 1 }}</span>
    </div>
  </div>
</div>
