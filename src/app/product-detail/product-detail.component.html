<div class="product-detail">
  <div class="product-container">
    <div class="product-grid">
      <!-- Image Section -->
      <div class="image-section">
        @if (product.imgUrl) {
					<img class="productImage"  
					[src]="'http://localhost:4000/' + product.imgUrl"  alt="kkk"  
			 >
				} @else {
					<img class="productImage"  
					[src]="'http://localhost:4000/uploads/1735588001278-photo_2024-11-21_19-21-24.jpg'"  alt="kkk"  
			 >
				}
      </div>

      <!-- Product Info Section -->
      <div class="product-info">
        <div class="product-header">
          <span class="category-badge">{{ product.category }}</span>
          <h1 class="product-title">{{ product.name }}</h1>
          <div class="product-price">${{ product.price }}</div>
        </div>

        <div class="info-grid">
          <div class="info-item">
            <span class="info-label">Producer:</span>
            <span class="info-value">{{ product.producer }}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Country:</span>
            <span class="info-value">{{ product.country }}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Rating:</span>
            <div class="rating">
              <div class="stars">
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
                <i class="bi bi-star-fill"></i>
              </div>
              <span>(5.0)</span>
            </div>
          </div>
        </div>

        <div class="quantity-section">
          <label for="quantity" class="quantity-label">Quantity:</label>
          <input
            type="number"
            class="quantity-input"
            id="quantity"
            value="1"
            min="1"
            max="100"
            #quantityInput
          />
        </div>

        <div class="action-buttons">
          <button 
            class="add-to-cart" 
            (click)="addToCart(product.id, +quantityInput.value)"
          >
            <i class="bi bi-cart-plus"></i>
            Add to Cart
          </button>
          <button class="back-btn" (click)="goback()">
            <i class="bi bi-arrow-left"></i>
            Back
          </button>
          <button class="cart-btn" (click)="gotoCart()">
            <i class="bi bi-cart"></i>
            View Cart
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
