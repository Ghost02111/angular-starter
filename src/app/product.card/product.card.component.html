<div class="product-card shadow-lg" (click)="gotoProductDetail()">
    <div style="
    width: 50%;
    height: 50%;
    border-radius: 20px;
    ">
    @if (product.imgUrl) {
      <img class="image"  
      [src]="'http://localhost:4000/' + product.imgUrl"  alt="kkk"  
   >
    } @else {
      <img class="image"  
      [src]="'http://localhost:4000/uploads/1735588001278-photo_2024-11-21_19-21-24.jpg'"  alt="kkk"  
   >
    }
        
    </div>
    <div class="p-3">
      <span class="category-badge mb-2 d-inline-block" style="color: blue;">
        {{ product.category }}
      </span>
      <h6 class="product-name">{{ product.name }}</h6>
  

      <div class="">         <!-- sticky footer class removed -->
        <div class="rating-stars mb-2" style="padding: 0;">
          <i class="bi bi-star-fill " style="color: #f3f023;"></i>
          <i class="bi bi-star-fill" style="color: #f3f023;"></i>
          <i class="bi bi-star-fill" style="color: #f3f023;"></i>
          <i class="bi bi-star-fill" style="color: #f3f023;"></i>
          <i class="bi bi-star-fill" style="color: #f3f023;"></i>
          <span class="text-muted ms-2">(5)</span>
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <span class="price">price: {{ product.price }}$</span>
          <button class="btn cart-btn" style="margin-left: 10px;">
            <i class="bi bi-cart-plus" ></i>
          </button>
        </div>
      </div>
    </div>
  </div>
